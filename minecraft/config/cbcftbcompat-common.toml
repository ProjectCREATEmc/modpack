#Master switch. When false, Create Big Cannons can grief claims again.
enabled = true
#When true, cannons obey each team's existing 'Allow explosions' toggle
#(ftbchunks:allow_explosions) - the same switch that governs TNT. A team
#that allows explosions also allows cannon block damage; otherwise cannons
#are blocked in their claims.
#When false, cannons are blocked in ALL claimed chunks regardless of the
#team's explosion setting (the original all-or-nothing behaviour).
respectTeamExplosionSetting = true
#Also guard direct setBlock(pos, AIR) calls, not just destroyBlock.
#Leave true for full coverage. If you ever see TPS issues, you can turn
#this off; most cannon block damage still goes through destroyBlock.
guardSetBlockToAir = true
#Log every cancelled cannon block edit. Debug only - very spammy.
logBlockedEdits = false
#Comma-separated Java package prefixes treated as 'cannon damage'.
#A block removal is only cancelled if one of these appears on the call
#stack AND the position is inside an FTB Chunks claim.
#Add a CBC addon's package prefix here if its projectiles still bypass
#protection (find it from the addon's class names in a crash log/jar).
cannonSourcePackages = "rbasamoyai.createbigcannons,rbasamoyai.ritchiesprojectilelib"
